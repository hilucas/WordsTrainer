<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Word Trainer Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #fbbf24;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1,
        h2,
        .card-title {
            font-family: 'Outfit', sans-serif;
        }

        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Menu View */
        #menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-top: 40px;
        }

        .header {
            text-align: left;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 32px;
            margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-summary {
            margin-bottom: 32px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-large {
            grid-column: span 2;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            background: var(--primary);
            color: #0f172a;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-sub {
            padding: 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-large:active,
        .btn-sub:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        select#category {
            width: 100%;
            padding: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 12px;
            margin-top: 8px;
            outline: none;
        }

        /* Study View */
        #study {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-bottom: 40px;
        }

        .flashcard {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            min-height: 300px;
        }

        .card-main {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .card-phonetic {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .card-meaning {
            font-size: 24px;
            line-height: 1.4;
            color: var(--primary);
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            width: 100%;
        }

        .action-tray {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .icon-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }

        .fav-active {
            color: var(--accent);
        }

        /* Bottom Controls */
        .bottom-controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 16px;
            padding-bottom: calc(16px + var(--safe-area-bottom));
            border-top: 1px solid var(--glass-border);
        }

        .grade-btn {
            border: none;
            border-radius: 14px;
            padding: 12px 0;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }

        .btn-again {
            background: #ef444433;
            color: #f87171;
            border: 1px solid #ef444455;
        }

        .btn-hard {
            background: #f59e0b33;
            color: #fbbf24;
            border: 1px solid #f59e0b55;
        }

        .btn-good {
            background: #3b82f633;
            color: #60a5fa;
            border: 1px solid #3b82f655;
        }

        .btn-easy {
            background: #10b98133;
            color: #34d399;
            border: 1px solid #10b98155;
        }

        .hidden {
            display: none !important;
        }

        /* Other Views (Search, Stats, Import) */
        .view-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            padding: 8px 0;
        }

        #result-container {
            flex: 1;
            overflow-y: auto;
        }

        #statText {
            line-height: 1.6;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Main Menu -->
        <div id="menu">
            <div class="header">
                <h1>Word Trainer</h1>
                <div id="today" class="small"></div>
            </div>

            <div class="stats-summary glass-panel">
                <div id="quick-stats">加载中...</div>
                <select id="category" onchange="init()"></select>
            </div>

            <div class="grid-buttons">
                <button class="btn-large" onclick="startStudy()">
                    <span>开始复习</span>
                </button>
                <button class="btn-sub" onclick="startNew()">学习新词</button>
                <button class="btn-sub" onclick="showSearch()">搜索单词</button>
                <button class="btn-sub" onclick="showStats()">统计图表</button>
                <button class="btn-sub" onclick="showImport()">导入导出</button>
            </div>
        </div>

        <!-- Study View -->
        <div id="study" class="hidden">
            <div class="view-header">
                <button class="back-btn" onclick="menu()">← 返回</button>
                <div class="card-title">正在练习</div>
                <div style="width: 50px"></div>
            </div>

            <div class="flashcard glass-panel" id="card">
                <!-- Content via JS -->
            </div>

            <div id="wordInfo"
                style="text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 12px;"></div>

            <div class="action-tray">
                <button id="speakBtn" class="icon-btn" onclick="speak()">🔊</button>
                <button id="favBtn" class="icon-btn" onclick="toggleFav()">⭐</button>
            </div>

            <!-- Grade buttons appear after flip -->
            <div id="rate" class="bottom-controls hidden">
                <button class="grade-btn btn-again" onclick="grade(1)">Again</button>
                <button class="grade-btn btn-hard" onclick="grade(3)">Hard</button>
                <button class="grade-btn btn-good" onclick="grade(4)">Good</button>
                <button class="grade-btn btn-easy" onclick="grade(5)">Easy</button>
            </div>

            <!-- Tap to show hint -->
            <div id="tap-hint" style="text-align:center; opacity: 0.6; font-size: 14px;">点击卡片翻转</div>
        </div>

        <!-- Search View -->
        <div id="search" class="hidden">
            <div class="view-header">
                <button class="back-btn" onclick="menu()">← 返回</button>
                <h2>搜索单词</h2>
            </div>
            <input type="text" id="q" placeholder="输入单词或中文含义..." oninput="search()">
            <div id="result-container">
                <div id="result"></div>
            </div>
        </div>

        <!-- Stats View -->
        <div id="stats" class="hidden">
            <div class="view-header">
                <button class="back-btn" onclick="menu()">← 返回</button>
                <h2>学习统计</h2>
            </div>
            <div class="glass-panel">
                <canvas id="chart" width="300" height="150" style="width:100%"></canvas>
                <div id="statText" style="margin-top: 20px"></div>
            </div>
        </div>

        <!-- Import View -->
        <div id="import" class="hidden">
            <div class="view-header">
                <button class="back-btn" onclick="menu()">← 返回</button>
                <h2>导入与备份</h2>
            </div>
            <div class="glass-panel">
                <div class="small" style="margin-bottom: 10px">格式：单词, 读音, 含义, 分类</div>
                <textarea id="importText" rows="6" placeholder="apple, /ˈæpl/, 苹果, fruit"></textarea>
                <button class="btn-large" onclick="importWords()" style="margin-bottom: 20px">导入词表</button>

                <h3 style="font-size: 16px; margin-bottom: 12px">数据备份</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
                    <button class="btn-sub" onclick="exportProgress()"
                        style="color: var(--success); border-color: rgba(34, 197, 94, 0.3)">导出备份</button>
                    <button class="btn-sub" onclick="importProgress()"
                        style="color: var(--accent); border-color: rgba(251, 191, 36, 0.3)">恢复备份</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
